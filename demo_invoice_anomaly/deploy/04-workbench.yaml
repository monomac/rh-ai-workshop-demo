---
# Workbench (Notebook CR) pro demo. Standardní Data Science Notebook image,
# 2 CPU / 8 Gi RAM, ephemeral volume pro session. Data Connection se připojí
# automaticky díky `notebooks.opendatahub.io/inject-oauth: 'true'` a sidecar
# secret reference níže.
#
# Po `oc apply` se workbench objeví v RHOAI Dashboard a controller / analytik
# si ho jedním klikem nastartuje.
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: invoice-anomaly-wb
  namespace: rh-ai-workshop
  labels:
    app: invoice-anomaly-wb
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
  annotations:
    openshift.io/display-name: "Invoice anomaly — workbench"
    opendatahub.io/username: "sp"
    notebooks.opendatahub.io/inject-oauth: "true"
    # Match the RHOAI Dashboard's notion of "Jupyter | Data Science | CPU | Python 3.12 (3.4)".
    # ImageStream name and git-commit verified against live sa-ai cluster on 2026-05-16.
    notebooks.opendatahub.io/last-image-selection: "s2i-generic-data-science-notebook:3.4"
    notebooks.opendatahub.io/last-image-version-git-commit-selection: "3a2ec4a"
spec:
  template:
    spec:
      serviceAccountName: invoice-anomaly-wb
      containers:
        - name: invoice-anomaly-wb
          # RHOAI 3.4 Standard Data Science Notebook — Jupyter + Python 3.12,
          # pandas / numpy / sklearn / matplotlib / boto3 / kfp preinstalled.
          #
          # Uses the in-cluster ImageStream tag so the workbench tracks
          # whatever build is current for the :3.4 line — at the time of
          # writing (2026-05-16) that's git commit 3a2ec4a, built 2026-05-01,
          # digest sha256:d82680de0790b333892da2179c12225f5858f862b060964f2c62314cb23714fe.
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-generic-data-science-notebook:3.4
          imagePullPolicy: IfNotPresent
          resources:
            requests: { cpu: "1",  memory: 4Gi }
            limits:   { cpu: "2",  memory: 8Gi }
          env:
            - name: NOTEBOOK_ARGS
              value: |
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/rh-ai-workshop/invoice-anomaly-wb
            - name: JUPYTER_IMAGE
              value: "s2i-generic-data-science-notebook:3.4"
            # MLFLOW_TRACKING_URI + MLFLOW_TRACKING_AUTH + MLFLOW_K8S_INTEGRATION
            # are auto-injected into the pod by the RHOAI `mlflowoperator`
            # mutating webhook (see KCS 7136121). It also creates the RoleBindings
            # `<wb>-mlflow` (ClusterRole/mlflow-operator-mlflow-integration) and
            # `<wb>-rbac-...-auth-delegator` on this notebook's ServiceAccount.
            # Do NOT set MLFLOW_TRACKING_URI here — the operator overrides it.
            - name: MODEL_REGISTRY_URL
              # External route of `elos-model-registry` in `rhoai-model-registries`.
              # NB the in-cluster Service is blocked by a NetworkPolicy that only
              # permits ingress from the OpenShift router, so we have to go via
              # the route. Cross-namespace registry RBAC for this SA is granted
              # by deploy/07-model-registry-rbac.yaml.
              value: https://elos-model-registry-rest.apps.rosa.sa-ai.oidv.p3.openshiftapps.com
          envFrom:
            - secretRef:
                name: aws-connection-rhoai-invoices   # injektuje AWS_* proměnné
          volumeMounts:
            - { name: workdir, mountPath: /opt/app-root/src }
          ports:
            - { name: notebook-port, containerPort: 8888, protocol: TCP }
      volumes:
        - name: workdir
          persistentVolumeClaim:
            claimName: invoice-anomaly-wb-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: invoice-anomaly-wb-pvc
  namespace: rh-ai-workshop
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: invoice-anomaly-wb
  namespace: rh-ai-workshop
