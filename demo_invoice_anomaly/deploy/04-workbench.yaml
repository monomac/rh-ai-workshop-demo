---
# Workbench (Notebook CR) pro demo. Standardní Data Science Notebook image,
# 2 CPU / 8 Gi RAM, ephemeral volume pro session. Data Connection se připojí
# automaticky díky `notebooks.opendatahub.io/inject-oauth: 'true'` a sidecar
# secret reference níže.
#
# Po `oc apply` se workbench objeví v RHOAI Dashboard a controller / analytik
# si ho jedním klikem nastartuje.
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: invoice-anomaly-wb
  namespace: rh-ai-workshop
  labels:
    app: invoice-anomaly-wb
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
  annotations:
    openshift.io/display-name: "Invoice anomaly — workbench"
    opendatahub.io/username: "sp"
    notebooks.opendatahub.io/inject-oauth: "true"
    # Dashboard hint — which "selectable image" this workbench corresponds to.
    # The actual image is pinned in the container spec below; this annotation
    # is cosmetic (controls the Dashboard's image-version dropdown). If the
    # Dashboard shows "custom image", run on the cluster:
    #   oc get imagestream -n redhat-ods-applications | grep -i datascience
    # and replace the value below with that imagestream's name + :3.4 tag.
    notebooks.opendatahub.io/last-image-selection: "jupyter-datascience:3.4"
spec:
  template:
    spec:
      serviceAccountName: invoice-anomaly-wb
      containers:
        - name: invoice-anomaly-wb
          # RHOAI 3.4 Standard Data Science Notebook — Jupyter + Python 3.12,
          # pandas / numpy / sklearn / matplotlib / boto3 preinstalled.
          # Digest matches RELATED_IMAGE_ODH_WORKBENCH_JUPYTER_DATASCIENCE_CPU_PY312_IMAGE
          # in the cluster's rhods-operator 3.4 CSV → this IS the latest 3.4 build.
          image: registry.redhat.io/rhoai/odh-workbench-jupyter-datascience-cpu-py312-rhel9@sha256:47ee99b94c4172f1d16ff968f3a67b2ca9f863af83e2e02446249f1ea357ae1f
          imagePullPolicy: IfNotPresent
          resources:
            requests: { cpu: "1",  memory: 4Gi }
            limits:   { cpu: "2",  memory: 8Gi }
          env:
            - name: NOTEBOOK_ARGS
              value: |
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/rh-ai-workshop/invoice-anomaly-wb
            - name: JUPYTER_IMAGE
              value: "odh-workbench-jupyter-datascience-cpu-py312-rhel9:3.4"
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow-server.rh-ai-workshop.svc.cluster.local:8080
            - name: MODEL_REGISTRY_URL
              value: http://model-registry-service.rh-ai-workshop.svc.cluster.local:8080
          envFrom:
            - secretRef:
                name: aws-connection-rhoai-invoices   # injektuje AWS_* proměnné
          volumeMounts:
            - { name: workdir, mountPath: /opt/app-root/src }
          ports:
            - { name: notebook-port, containerPort: 8888, protocol: TCP }
      volumes:
        - name: workdir
          persistentVolumeClaim:
            claimName: invoice-anomaly-wb-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: invoice-anomaly-wb-pvc
  namespace: rh-ai-workshop
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: invoice-anomaly-wb
  namespace: rh-ai-workshop
