---
# Minimální MinIO deployment pro workshop (single-replica, ephemeral by default).
# Pro produkci by se použila Noobaa/ODF nebo externí S3. Tady jde o demo.
apiVersion: v1
kind: Secret
metadata:
  name: minio-root
  namespace: rh-ai-workshop
type: Opaque
stringData:
  rootUser: minioadmin
  rootPassword: change-me-in-prod
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: rh-ai-workshop
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: rh-ai-workshop
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: minio-root, key: rootUser } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: minio-root, key: rootPassword } }
          ports:
            - { name: api,     containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: minio-data }
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: rh-ai-workshop
spec:
  selector: { app: minio }
  ports:
    - { name: api,     port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: minio-console
  namespace: rh-ai-workshop
spec:
  to: { kind: Service, name: minio }
  port: { targetPort: console }
  tls: { termination: edge }
